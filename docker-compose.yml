version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: equa-postgres
    environment:
      POSTGRES_DB: equadb
      POSTGRES_USER: equauser
      POSTGRES_PASSWORD: equapass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - equa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equauser -d equadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equa-app
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/equadb
      DB_USERNAME: equauser
      DB_PASSWORD: equapass
      AI_SERVICE_URL: http://ai-service:5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - equa-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: equa-ai-service
    ports:
      - "5000:5000"
    environment:
      EUREKA_SERVER_URL: http://app:8761/eureka/
      INSTANCE_HOST: ai-service
      INSTANCE_PORT: 5000
    depends_on:
      - app
    networks:
      - equa-network

volumes:
  postgres_data:

networks:
  equa-network:
    driver: bridge

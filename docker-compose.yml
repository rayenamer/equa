version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: equa-postgres
    environment:
      POSTGRES_DB: equadb
      POSTGRES_USER: equauser
      POSTGRES_PASSWORD: equapass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - equa-network

  # backend:
  #   build: .
  #   container_name: equa-backend
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/equadb
  #     SPRING_DATASOURCE_USERNAME: equauser
  #     SPRING_DATASOURCE_PASSWORD: equapass
  #   depends_on:
  #     - postgres
  #   networks:
  #     - equa-network

volumes:
  postgres_data:

networks:
  equa-network:
    driver: bridge
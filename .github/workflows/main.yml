name: Build

on:
  push:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Spin up a Postgres service container for tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: equadb
          POSTGRES_USER: equauser
          POSTGRES_PASSWORD: equapass
        ports:
          - 54333:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5433/equadb
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          OAUTH2_REDIRECT_URI: http://localhost:8081/swagger-ui.html
          PASSWORD_RESET_BASE_URL: http://localhost:8081/swagger-ui.html
        run: mvn clean verify



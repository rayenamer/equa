name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Spin up a Postgres service container for tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: equadb
          POSTGRES_USER: equauser
          POSTGRES_PASSWORD: equapass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5432/equadb
          DB_USERNAME: equauser
          DB_PASSWORD: equapass
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          OAUTH2_REDIRECT_URI: http://localhost:8081/swagger-ui.html
          PASSWORD_RESET_BASE_URL: http://localhost:8081/swagger-ui.html
        run: mvn clean verify
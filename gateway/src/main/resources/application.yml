server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Wallet Service routes
        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/wallets/**
        - id: token-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/tokens/**
        - id: asset-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/assets/**
        - id: advanced-business
          uri: lb://wallet-service
          predicates:
            - Path=/api/advanced/**
        - id: analytics-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/analytics/**
        - id: wallet-swagger
          uri: lb://wallet-service
          predicates:
            - Path=/swagger-ui/**, /v3/api-docs/**, /api-docs/**

        # AI Service routes
        - id: ai-service
          uri: http://ai-service:5000
          predicates:
            - Path=/api/ai/**
        - id: ai-health
          uri: http://ai-service:5000
          predicates:
            - Path=/ai/health
          filters:
            - RewritePath=/ai/health, /health

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

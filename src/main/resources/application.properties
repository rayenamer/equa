# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/equadb}
spring.datasource.username=${DB_USERNAME:equauser}
spring.datasource.password=${DB_PASSWORD:equapass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081

# Session
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=10m

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Redirects
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8081/swagger-ui.html}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:8081/swagger-ui.html}
app.password-reset.token-validity-minutes=60

# Anti-bruteforce : apres N echecs, verrouillage temporaire (sans email ; mailing uniquement sur mot de passe oublie)
app.auth.max-login-attempts=3
app.auth.lockout-minutes=1

# reCAPTCHA
app.recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}

# SMTP - reset password emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=

# OAuth2 - Google (definir GOOGLE_CLIENT_ID et GOOGLE_CLIENT_SECRET dans l'environnement ou remplir ci-dessous)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile


spring.jackson.serialization.fail-on-self-references=false

gemini.api.key=${GEMINI_API_KEY:}
####################################

# Forum - seuil de signalements avant masquage automatique
app.forum.report.threshold=3

# Forum - filtrage de langage inapproprié
# Liste de mots séparés par des virgules (exemple à adapter selon ton besoin)
app.forum.profanity.words=merde,idiot
# Score minimal pour considérer un texte comme problématique (>= threshold)
app.forum.profanity.threshold=1

springdoc.swagger-ui.persistAuthorization=true
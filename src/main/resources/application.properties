# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/equadb}
spring.datasource.username=${DB_USERNAME:equauser}
spring.datasource.password=${DB_PASSWORD:equapass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=drop-and-create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081

# Session
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=10m

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Redirects
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8081/swagger-ui.html}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:8081/swagger-ui.html}
app.password-reset.token-validity-minutes=60

# Auth lockout
app.auth.max-login-attempts=3
app.auth.lockout-minutes=1

# reCAPTCHA
app.recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}

spring.jackson.serialization.fail-on-self-references=false


<div class="audit-container">
    <header class="page-header">
        <h1>Historique d'Activité</h1>
        <p class="subtitle">Consultez toutes les actions effectuées sur votre compte.</p>
    </header>

    <div *ngIf="loading" class="state-message">Chargement de l'historique...</div>
    <div *ngIf="errorMessage && !loading" class="state-message error">{{ errorMessage }}</div>

    <div class="logs-card">
        <div class="table-container" *ngIf="!loading && logs.length">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Date & Heure</th>
                        <th>Action</th>
                        <th>Détails</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let log of logs">
                        <td class="date-cell">{{ log.timestamp | date:'medium' }}</td>
                        <td>
                            <span class="action-tag">{{ log.action }}</span>
                        </td>
                        <td class="details-cell">{{ log.details }}</td>
                        <td>
                            <span class="status-indicator success"></span>
                            Succès
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div *ngIf="!loading && !logs.length" class="state-message">Aucune activite enregistree pour le moment.</div>
    </div>
</div>

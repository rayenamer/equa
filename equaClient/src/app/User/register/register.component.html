<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div class="logo">EQUA</div>
                <h1>Create an account</h1>
                <p>Join the decentralized financial revolution today.</p>
            </header>

            <form (submit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <app-ui-input type="text" name="username" placeholder="Username" [(value)]="user.username"
                        [required]="true">
                    </app-ui-input>
                </div>
                <div class="form-group">
                    <app-ui-input type="email" name="email" placeholder="Email" [(value)]="user.email"
                        [required]="true">
                    </app-ui-input>
                </div>
                <div class="form-group">
                    <app-ui-input type="password" name="password" placeholder="Password" [(value)]="user.password"
                        [required]="true">
                    </app-ui-input>
                </div>
                <!--
                <div class="role-selector">
                    <label>Account type</label>
                    <div class="roles">
                        <button type="button" 
                                [class.active]="user.userType === 'OBSERVER'"
                                (click)="user.userType = 'OBSERVER'">
                            Observer
                        </button>
                        <button type="button" 
                                [class.active]="user.userType === 'ASSISTANT'"
                                (click)="user.userType = 'ASSISTANT'">
                            Assistant
                        </button>
                    </div>
                </div>
                -->

                <p class="terms">
                    By registering, you agree to our <a>Terms of Service</a> and <a>Privacy Policy</a>.
                </p>

                <app-ui-button label="Create account" type="submit" variant="primary" size="lg" class="submit-btn"
                    [disabled]="loading">
                    <span *ngIf="loading">Registering...</span>
                    <span *ngIf="!loading">Create account</span>
                </app-ui-button>

                <div *ngIf="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <button (click)="signupWithGoogle()" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Google
            </button>

            <footer class="auth-footer">
                Already have an account? <a routerLink="/user/login">Log in</a>
            </footer>
        </div>
    </div>
</div>

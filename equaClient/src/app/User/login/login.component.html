<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div class="logo">EQUA</div>
                <h1>Welcome Back</h1>
                <p>Log in to your account to access the ecosystem.</p>
            </header>

            <form (submit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <app-ui-input type="email" name="email" placeholder="Email" [(value)]="credentials.email"
                        [required]="true">
                    </app-ui-input>
                </div>
                <div class="form-group">
                    <app-ui-input type="password" name="password" placeholder="Password"
                        [(value)]="credentials.password" [required]="true">
                    </app-ui-input>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Se souvenir de moi
                    </label>
                    <a routerLink="/user/forgot-password" class="forgot-pwd">Mot de passe oublié ?</a>
                </div>

                <app-ui-button label="Se connecter" type="submit" variant="primary" size="lg" class="submit-btn"
                    [disabled]="loading">
                    <span *ngIf="loading">Connexion...</span>
                    <span *ngIf="!loading">Se connecter</span>
                </app-ui-button>

                <div *ngIf="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <button (click)="loginWithGoogle()" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Google
            </button>

            <footer class="auth-footer">
                Don't have an account? <a routerLink="/user/register">Sign up</a>
            </footer>
        </div>
    </div>
</div>

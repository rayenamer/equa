<div class="ai-insights-page">
    <header class="section-header">
        <div class="header-content">
            <h1>Intelligence Artificielle</h1>
            <p>Analyse prédictive et assistance interactive pour la blockchain EQUA.</p>
        </div>
        <button class="analyze-btn" (click)="runAnalysis()" [disabled]="isAnalyzing">
            <span class="icon">󰒋</span>
            {{ isAnalyzing ? 'Analyse en cours...' : 'Lancer une Analyse' }}
        </button>
    </header>

    <div class="grid-layout">
        <!-- Top Row: Health & Prediction -->
        <div class="dashboard-row">
            <app-ai-network-health></app-ai-network-health>
            <app-ai-validator-prediction></app-ai-validator-prediction>
        </div>

        <!-- Middle Row: Analysis Report -->
        <div class="analysis-row">
            <app-ai-analyzer [analysisText]="analysisText" [isAnalyzing]="isAnalyzing"></app-ai-analyzer>
        </div>

        <!-- Bottom Row: Interactive Chat -->
        <div class="chat-row">
            <app-ai-chat></app-ai-chat>
        </div>
    </div>
</div>

<div class="blocks-page">
    <header class="section-header">
        <h1>Explorateur de Blocs</h1>
        <p>Visualisez les blocs minés en temps réel sur la blockchain EQUA.</p>
    </header>

    <div class="stats-grid">
        @for (stat of blockStats(); track stat.label) {
        <app-stat-card [label]="stat.label" [value]="stat.value"></app-stat-card>
        }
    </div>

    <app-block-highlights [latestBlock]="latestBlock()" [genesisBlock]="genesisBlock()">
    </app-block-highlights>

    <app-block-explorer-tools></app-block-explorer-tools>

    <div class="table-section card-container">
        <div class="card-header">
            <h2>Derniers Blocs</h2>
        </div>
        <app-blocks-table [blocks]="blocks()"></app-blocks-table>
    </div>
</div>

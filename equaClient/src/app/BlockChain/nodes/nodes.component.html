<div class="nodes-page">
    <header class="section-header">
        <h1>Surveillance des Nœuds</h1>
        <p>Visualisation des validateurs et de leur état de santé sur le réseau.</p>
    </header>

    <div class="stats-grid">
        <app-stat-card *ngFor="let stat of nodeStats" [label]="stat.label" [value]="stat.value"></app-stat-card>
    </div>

    <div class="nodes-visualizer card-container">
        <div class="card-header">
            <h2>Top Validateurs</h2>
        </div>
        <div class="grid-wrapper">
            <app-tokens-grid [items]="nodes" [columns]="2"></app-tokens-grid>
        </div>
    </div>
</div>

<div class="wallet-page fade-in">
  <header class="section-header">
    <h1>Mes Portefeuilles</h1>
    <p>Gérez vos actifs numériques en toute sécurité sur le réseau EQUA.</p>
  </header>

  <div class="wallet-grid">

    <!-- Dinar Wallet Section -->
    <app-wallet-card title="Portefeuille Dinar" [exists]="dinarWalletExists && !!dinarWallet"
      emptyTitle="Aucun portefeuille Dinar"
      emptyDesc="Créez votre portefeuille Dinar pour commencer à alimenter votre compte."
      btnText="Initialiser mon Portefeuille" [balance]="dinarWallet?.balance || 0"
      [walletId]="dinarWallet?.walletId || ''" [subValue]="dinarWallet?.balance || 0" currency="Dinar"
      subLabel="Unités en main" (create)="createDinarWallet()">
      <app-dinar-actions (action)="handleWalletAction($event)"></app-dinar-actions>
    </app-wallet-card>

    <!-- Equa Wallet Section -->
    <app-wallet-card title="Portefeuille EQUA" [exists]="equaWalletExists && !!equaWallet"
      emptyTitle="Aucun portefeuille EQUA"
      emptyDesc="Activez votre portefeuille EQUA pour participer à l'économie du réseau." btnText="Activer EQUA"
      [balance]="equaWallet?.equaAmount || 0" [walletId]="equaWallet?.id?.toString() || ''"
      [subValue]="equaWallet?.equaAmount || 0" currency="EQUA" subLabel="Points EQUA" (create)="createEquaWallet()">
      @if (dinarWalletExists) {
      <div class="simple-converter">
        <input type="number" [(ngModel)]="convertAmount" placeholder="Montant en Dinars..." class="conv-input">
        <button (click)="convertDinars()" class="conv-btn">Convertir en EQUA</button>
      </div>
      }
    </app-wallet-card>

  </div>
</div>

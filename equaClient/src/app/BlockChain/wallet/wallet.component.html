<div class="wallet-page">
    <header class="section-header">
        <h1>Portefeuille Dinar (Local)</h1>
        <p>Gérez vos fonds en monnaie locale avant de les convertir en jetons EQUA.</p>
    </header>

    @if (myWallet) {
    <div class="wallet-dashboard">
        <div class="top-row">
            <app-dinar-balance-card [balance]="myWallet.balance" [walletId]="myWallet.walletId"
                [dinarCount]="myWallet.dinars.length">
            </app-dinar-balance-card>
        </div>

        <app-dinar-actions (action)="handleWalletAction($event)"></app-dinar-actions>
    </div>
    } @else {
    <div class="no-wallet card-container">
        <div class="empty-icon">󰄗</div>
        <h2>Aucun portefeuille trouvé</h2>
        <p>Vous n'avez pas encore de portefeuille Dinar. Créez-en un pour commencer à utiliser le système.</p>
        <button class="create-btn" (click)="createWallet()">Créer mon Portefeuille</button>
    </div>
    }
</div>

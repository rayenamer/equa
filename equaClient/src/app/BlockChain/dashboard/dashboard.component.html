<div class="dashboard-page">

    <div class="wallet-stats-grid">
        <app-compact-balance label="Solde Dinar" [amount]="dinarWallet()?.balance || 0" currency="TND" symbol="DT"
            gradient="linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)">
        </app-compact-balance>

        <app-compact-balance label="Solde EQUA" [amount]="equaWallet()?.equaAmount || 0" currency="EQUA" symbol="EQ"
            gradient="linear-gradient(135deg, #627eea 0%, #3d5afe 100%)">
        </app-compact-balance>
    </div>

    <div class="chart-section card-container">
        <div class="card-header">
            <h2>Évolution du Prix (Real-time)</h2>
            <div class="rate-badge">
                <span class="rate-main">1 EQUA = {{ currentRate() | number:'1.4-4' }} TND</span>
                <span class="rate-divider">|</span>
                <span class="rate-sub">1 TND = {{ dinarsPerEqua() | number:'1.4-4' }} EQUA</span>
            </div>
        </div>
        <div class="home-chart-container">
            <p-chart type="line" [data]="lineChartData" [options]="lineChartOptions" class="home-chart"></p-chart>
        </div>
    </div>

    <div class="table-section card-container">
        <div class="card-header">
            <h2>Transactions Récentes</h2>
            <app-ui-button variant="secondary" size="md" routerLink="/blockchain/transactions">
                Voir tout
            </app-ui-button>
        </div>
        <app-transactions-table [transactions]="recentTransactions()"></app-transactions-table>
    </div>

</div>

<div class="portfolio-page">

    <div class="page-header">
        <h1 class="page-title">Portefeuille Business</h1>
        <p class="page-sub">Votre portefeuille EQUA dédié à votre activité commerciale</p>
    </div>

    <!-- Equa Wallet Card -->
    <div class="wallet-section">
        <app-wallet-card title="Portefeuille EQUA" [exists]="walletExists" [balance]="equaWallet?.balance ?? 0"
            [walletId]="equaWallet?.publicKey ?? ''" currency="EQUA" subLabel="Tokens disponibles"
            [subValue]="equaWallet?.equaAmount ?? 0" emptyTitle="Aucun portefeuille EQUA"
            emptyDesc="Créez votre portefeuille EQUA pour gérer vos fonds business." btnText="Créer le portefeuille"
            (create)="createEquaWallet()">
        </app-wallet-card>
    </div>

    <!-- Send Button -->
    @if (walletExists) {
    <button class="btn-send" (click)="showSendModal = true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        Envoyer des fonds
    </button>
    }

    <!-- Send Modal -->
    @if (showSendModal) {
    <div class="modal-overlay" (click)="closeSend()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <h2>Envoyer des fonds</h2>
                <button type="button" class="btn-close" (click)="closeSend()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                        stroke-width="2" viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label>Identifiant du destinataire</label>
                    <input type="text" [(ngModel)]="sendForm.recipientId" class="form-control"
                        placeholder="ID du portefeuille destinataire" />
                </div>
                <div class="form-group">
                    <label>Montant (EQUA)</label>
                    <input type="number" [(ngModel)]="sendForm.montant" class="form-control" placeholder="0.00"
                        min="1" />
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" (click)="closeSend()">Annuler</button>
                <button type="button" class="btn-confirm" [disabled]="!sendForm.recipientId || !sendForm.montant"
                    (click)="confirmSend()">
                    Confirmer l'envoi
                </button>
            </div>
        </div>
    </div>
    }

</div>

<div
  #chartHost
  class="price-chart-wrapper"
  (mousemove)="onMouseMove($event)"
  (mouseleave)="onMouseLeave()"
>
  <svg class="price-chart-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
    <defs>
      <linearGradient id="priceLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f97373" />
        <stop offset="45%" stop-color="#f97373" />
        <stop offset="50%" stop-color="#4ade80" />
        <stop offset="100%" stop-color="#4ade80" />
      </linearGradient>
      <linearGradient id="priceAreaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(74, 222, 128, 0.4)" />
        <stop offset="100%" stop-color="rgba(74, 222, 128, 0)" />
      </linearGradient>
    </defs>

    <!-- Bande de base -->
    <rect x="0" y="0" width="100" height="40" fill="transparent" />

    <!-- Zone sous la courbe -->
    <path
      *ngIf="areaD"
      class="chart-area"
      [attr.d]="areaD"
      fill="url(#priceAreaGradient)"
    />

    <!-- Courbe principale -->
    <path
      *ngIf="pathD"
      class="chart-line-main"
      [attr.d]="pathD"
      fill="none"
      stroke="url(#priceLineGradient)"
    />

    <!-- Point et ligne au survol -->
    <ng-container *ngIf="hover as h">
      <line
        class="hover-line"
        [attr.x1]="h.x"
        y1="0"
        [attr.x2]="h.x"
        y2="40"
      />
      <circle
        class="hover-dot"
        [attr.cx]="h.x"
        [attr.cy]="h.y"
        r="1.3"
      />
    </ng-container>
  </svg>

  <div
    *ngIf="hover as h"
    class="chart-tooltip"
    [ngStyle]="{ left: h.xPercent + '%', top: h.yPercent + '%' }"
  >
    <div class="tooltip-price">{{ h.price | number:'1.3-3' }} €</div>
    <div class="tooltip-time">{{ h.time }}</div>
  </div>

  <span class="chart-watermark">Aperçu graphique EQUA</span>
</div>

@if (href) {
  <a
    [href]="href"
    class="btn"
    [class.btn-primary]="variant === 'primary'"
    [class.btn-secondary]="variant === 'secondary'"
    [class.btn-lg]="size === 'lg'"
    [class.is-disabled]="disabled"
    [attr.aria-disabled]="disabled"
    (click)="onClick($event)"
  >
    {{ label }}
  </a>
} @else {
  <button
    [type]="type"
    class="btn"
    [class.btn-primary]="variant === 'primary'"
    [class.btn-secondary]="variant === 'secondary'"
    [class.btn-lg]="size === 'lg'"
    [disabled]="disabled"
    (click)="onClick($event)"
  >
    {{ label }}
  </button>
}

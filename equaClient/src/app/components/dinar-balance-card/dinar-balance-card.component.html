<div class="balance-card">
  <div class="card-glow"></div>

  <div class="card-content">
    <div class="header">
      <div class="wallet-info">
        <span class="label">{{ title }}</span>
        <span class="id">ID: {{ walletId }}</span>
      </div>
    </div>

    <div class="balance-display">
      <span class="currency">{{ currency }}</span>
      <span class="amount">{{ balance | number:'1.2-4' }}</span>
    </div>

    <div class="footer">
      <div class="stat">
        <span class="stat-label">{{ subLabel }}</span>
        <span class="stat-value">{{ dinarCount | number:'1.2-4' }}</span>
      </div>

      <div class="status">
        <span class="dot"></span>
        Actif
      </div>
    </div>
  </div>
</div>

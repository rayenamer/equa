<div class="actions-grid">
    <!-- Deposit Action -->
    <div class="action-card">
        <div class="icon">↓</div>
        <h3>Dépôt de Fonds</h3>
        <p>Alimentez votre portefeuille Dinar pour pouvoir ensuite les convertir en tokens EQUA.</p>
        <div class="input-group">
            <input type="number" [(ngModel)]="depositAmount" placeholder="Montant en DT..." min="1">
            <button (click)="onDeposit()" [disabled]="!depositAmount || depositAmount <= 0">Déposer</button>
        </div>
    </div>
</div>

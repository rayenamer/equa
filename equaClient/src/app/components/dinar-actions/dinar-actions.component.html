<div class="actions-grid">
    <!-- Deposit Section -->
    <div class="action-card deposit">
        <div class="icon">󰄔</div>
        <h3>Déposer des Dinars</h3>
        <p>Ajoutez des fonds à votre compte pour les échanger plus tard.</p>
        <div class="input-group">
            <input type="number" [(ngModel)]="depositAmount" placeholder="Montant en TND...">
            <button (click)="onDeposit()" [disabled]="!depositAmount || depositAmount <= 0">
                Déposer
            </button>
        </div>
    </div>

    <!-- Withdraw Section -->
    <div class="action-card withdraw">
        <div class="icon">󰄚</div>
        <h3>Retirer des Dinars</h3>
        <p>Transférez vos fonds vers un autre service ou retirez-les.</p>
        <div class="input-group">
            <input type="number" [(ngModel)]="withdrawAmount" placeholder="Montant en TND...">
            <button (click)="onWithdraw()" [disabled]="!withdrawAmount || withdrawAmount <= 0">
                Retirer
            </button>
        </div>
    </div>
</div>

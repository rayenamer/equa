<app-token-intro [sectionId]="'token-intro'" [title]="'Le token EQUA'" [tagline]="'Finance Without Barriers'"
  [description]="tokenIntroDescription" />

<app-tokens-market [title]="'Tokens du marché'" />

<!-- Chiffres clés -->
<section #statsSection>
  <app-stats-strip [stats]="statsStripItems" />
</section>

<app-how-it-works [sectionId]="'how-it-works'" [title]="'Comment ça marche'" [steps]="howItWorksSteps" />

<app-price-overview [priceValue]="priceOverview.priceValue" [priceChange]="priceOverview.priceChange"
  [whyPriceLabel]="priceOverview.whyPriceLabel" [stats]="priceOverview.stats" [tabs]="priceOverview.tabs"
  [activeTab]="priceOverview.activeTab" [chips]="priceOverview.chips" [activeChip]="priceOverview.activeChip"
  (whyPriceClick)="onWhyPriceClick()" (tabSelect)="onPriceTabSelect($event)" (chipSelect)="onPriceChipSelect($event)" />
<section class="home-chart-section">
  <div class="home-chart-container">
    <p-chart
      type="line"
      [data]="lineChartData"
      [options]="lineChartOptions"
      class="home-chart"
    ></p-chart>
  </div>
</section>
<!-- Marchés EQUA -->
<div class="financial-chart-section">
  <div class="financial-chart-container">
  <app-financial-chart
    [data]="chartData"
    [title]="chartTitle"
    [annotations]="chartAnnotations"
  />
  </div>
</div>
<app-markets-table />

<app-faq-section [title]="'Questions fréquentes'" [items]="faqItems" [openIndex]="faqOpen"
  (itemToggle)="toggleFaq($event)" />

<app-cta-banner [sectionId]="'contact-cta'" [title]="'Prêt à commencer ?'" [text]="ctaBannerText"
  [buttonLabel]="'Rejoindre EQUA'" (buttonClick)="onJoinCtaClick($event)" />


<app-back-to-top-button [visible]="showBackToTop" [ariaLabel]="'Retour en haut'" (pressed)="scrollToTop()" />

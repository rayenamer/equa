<div class="coming-soon-wrapper">
    <div class="glow-bg"></div>

    <div class="content-card card-container">
        <div class="badge"> PROCHAINEMENT</div>
        <h1>Quelque chose d'extraordinaire se prépare</h1>
        <p class="subtitle">Nous travaillons d'arrache-pied pour vous apporter la meilleure expérience de finance
            décentralisée.</p>

        <div class="countdown-sim">
            <div class="time-box">
                <span class="number">{{ days }}</span>
                <span class="label">JOURS</span>
            </div>
            <div class="time-box">
                <span class="number">{{ hours }}</span>
                <span class="label">HEURES</span>
            </div>
            <div class="time-box">
                <span class="number">{{ minutes }}</span>
                <span class="label">MINS</span>
            </div>
            <div class="time-box">
                <span class="number">{{ seconds }}</span>
                <span class="label">SECS</span>
            </div>
        </div>
    </div>
</div>
